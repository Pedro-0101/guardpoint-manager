<div class="dialog">
  <h2 class="dialog__title">{{ title() }}</h2>
  <p class="dialog__message">{{ message() }}</p>
  <div class="dialog__actions">
    <button class="dialog__btn dialog__btn--cancel" mat-dialog-close>
      {{ cancelLabel() }}
    </button>
    <button class="dialog__btn dialog__btn--confirm" [mat-dialog-close]="true">
      {{ confirmLabel() }}
    </button>
  </div>
</div>
