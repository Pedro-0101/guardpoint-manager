<header class="header">
  <button class="header__menu-btn" (click)="toggleSidebar.emit()">
    <ng-icon name="lucideMenu" />
  </button>

  <div class="header__spacer"></div>

  <div class="header__actions">
    <button class="header__icon-btn" (click)="toggleTheme()" [attr.title]="theme() === 'light' ? 'Modo escuro' : 'Modo claro'">
      @if (theme() === 'light') {
        <ng-icon name="lucideMoon" />
      } @else {
        <ng-icon name="lucideSun" />
      }
    </button>

    <button class="header__icon-btn">
      <ng-icon name="lucideBell" />
      @if (notificationCount() > 0) {
        <span class="header__badge">{{ notificationCount() }}</span>
      }
    </button>

    <div class="header__user">
      <div class="header__avatar">
        <ng-icon name="lucideUser" />
      </div>
      <div class="header__user-info">
        <span class="header__user-name">{{ userName() }}</span>
        @if (userRole()) {
          <span class="header__user-role">{{ userRole() }}</span>
        }
      </div>
    </div>

    <button class="header__icon-btn" (click)="logout.emit()" title="Sair">
      <ng-icon name="lucideLogOut" />
    </button>
  </div>
</header>
