<nav class="navbar">
  <div class="navbar__left">
    <a routerLink="/dashboard" class="navbar__brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="var(--color-primary)" />
        <path d="M16 6L26 22H6L16 6Z" fill="var(--color-primary-foreground)" opacity="0.9" />
        <circle cx="16" cy="19" r="4" fill="var(--color-primary-foreground)" />
      </svg>
      <span class="navbar__title">GuardPoint</span>
    </a>

    <div class="navbar__nav">
      <a
        class="navbar__link"
        routerLink="/dashboard"
        routerLinkActive="navbar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <ng-icon name="lucideLayoutDashboard" class="navbar__link-icon" />
        Dashboard
      </a>

      <div class="relative">
        <button type="button" z-button zType="ghost" z-menu zTrigger="hover" [zMenuTriggerFor]="gestaoMenu">
          Gestão
          <ng-icon name="lucideChevronDown" class="ml-1" />
        </button>
        <ng-template #gestaoMenu>
          <div z-menu-content class="w-48">
            <a routerLink="/postos" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideMapPin" class="mr-2" />
              Postos
            </a>
            <a routerLink="/usuarios" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideUsers" class="mr-2" />
              Usuários
            </a>
            <a routerLink="/escalas" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideCalendarDays" class="mr-2" />
              Escalas
            </a>
          </div>
        </ng-template>
      </div>

      <div class="relative">
        <button type="button" z-button zType="ghost" z-menu zTrigger="hover" [zMenuTriggerFor]="operacoesMenu">
          Operações
          <ng-icon name="lucideChevronDown" class="ml-1" />
        </button>
        <ng-template #operacoesMenu>
          <div z-menu-content class="w-48">
            <a routerLink="/mapa" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideMap" class="mr-2" />
              Mapa
            </a>
            <a routerLink="/turnos" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideClock" class="mr-2" />
              Turnos
            </a>
            <a routerLink="/alertas" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideShieldAlert" class="mr-2" />
              Alertas
            </a>
            <a routerLink="/substituicoes" routerLinkActive="navbar__menu-item--active" z-menu-item>
              <ng-icon name="lucideArrowRightLeft" class="mr-2" />
              Substituições
            </a>
          </div>
        </ng-template>
      </div>

      <a
        class="navbar__link"
        routerLink="/relatorios"
        routerLinkActive="navbar__link--active"
      >
        <ng-icon name="lucideBarChart3" class="navbar__link-icon" />
        Relatórios
      </a>

      <div class="relative">
        <button type="button" z-button zType="ghost" z-menu zTrigger="hover" [zMenuTriggerFor]="configMenu">
          Configurações
          <ng-icon name="lucideChevronDown" class="ml-1" />
        </button>
        <ng-template #configMenu>
          <div z-menu-content class="w-56">
            <a routerLink="/configuracoes" routerLinkActive="navbar__menu-item--active"
               [routerLinkActiveOptions]="{ exact: true }" z-menu-item>
              <ng-icon name="lucideSettings" class="mr-2" />
              Geral
            </a>
            <a routerLink="/configuracoes/escalonamento" routerLinkActive="navbar__menu-item--active"
               [routerLinkActiveOptions]="{ exact: true }" z-menu-item>
              <ng-icon name="lucideBell" class="mr-2" />
              Escalonamento
            </a>
          </div>
        </ng-template>
      </div>
    </div>
  </div>

  <div class="navbar__right">
    <button class="navbar__icon-btn" (click)="toggleTheme()" [attr.title]="theme() === 'light' ? 'Modo escuro' : 'Modo claro'">
      @if (theme() === 'light') {
        <ng-icon name="lucideMoon" />
      } @else {
        <ng-icon name="lucideSun" />
      }
    </button>

    <button
      class="navbar__icon-btn navbar__notifications"
      z-menu
      zTrigger="click"
      zPlacement="bottomRight"
      [zMenuTriggerFor]="notificationPanel"
    >
      <ng-icon name="lucideBell" />
      @if (notificationCount() > 0) {
        <z-badge
          zShape="pill"
          class="absolute top-1 right-1 h-[18px] min-w-[18px] justify-center px-1 bg-[var(--color-warn)] text-[var(--color-warning-foreground)] text-[11px] font-semibold"
        >
          {{ notificationCount() }}
        </z-badge>
      }
    </button>
    <ng-template #notificationPanel>
      <div z-menu-content class="w-[380px] p-0 overflow-hidden" (click)="$event.stopPropagation()">
        <gp-notification-list />
      </div>
    </ng-template>

    <div class="navbar__user">
      <gp-avatar [name]="userName()" size="sm" />
      <div class="navbar__user-info">
        <span class="navbar__user-name">{{ userName() }}</span>
        @if (userRole()) {
          <span class="navbar__user-role">{{ userRole() }}</span>
        }
      </div>
    </div>

    <button class="navbar__icon-btn" (click)="logout.emit()" title="Sair">
      <ng-icon name="lucideLogOut" />
    </button>
  </div>
</nav>
