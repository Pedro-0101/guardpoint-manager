<div class="flex min-h-screen flex-col lg:flex-row">
  <div class="flex flex-1 items-center justify-center bg-background p-4 sm:p-8">
    <div class="w-full max-w-md space-y-6 sm:space-y-8">
      <div class="text-center">
        <h1 class="text-2xl font-bold sm:text-3xl">GuardPoint</h1>
        <p class="mt-2 text-sm text-muted-foreground sm:text-base">Painel Gerencial</p>
      </div>

      <z-card class="p-4 sm:p-6 lg:p-8">
        @if (loginError(); as error) {
          <div class="mb-4 rounded-md bg-destructive/15 p-3 text-sm text-destructive">
            {{ error }}
          </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-4 sm:space-y-6">
          <z-form-field>
            <z-form-label [zRequired]="true">Email</z-form-label>
            <z-form-control>
              <input z-input type="email" formControlName="email" placeholder="seu@email.com" class="w-full" />
            </z-form-control>
          </z-form-field>

          <z-form-field>
            <div class="flex items-center justify-between">
              <z-form-label [zRequired]="true">Senha</z-form-label>
              <a z-button zType="link" class="p-0" href="#">Esqueceu a senha?</a>
            </div>
            <z-form-control>
              <input z-input [zPass]="true" [zMinlength]="6" formControlName="senha" placeholder="••••••••" class="w-full" />
            </z-form-control>
            <z-form-message>Use pelo menos 6 caracteres.</z-form-message>
          </z-form-field>

          <div class="flex items-center gap-2">
            <z-checkbox id="remember" formControlName="rememberMe"></z-checkbox>
            <label for="remember" class="text-sm cursor-pointer select-none">Lembrar-me por 30 dias</label>
          </div>

          <button type="submit" z-button [zFull]="true" [zLoading]="isLoading()" [disabled]="isLoading()">Entrar</button>
        </form>
      </z-card>

      <p class="text-center text-sm text-muted-foreground">
        Não tem uma conta?
        <a z-button zType="link" href="#" class="px-0">Cadastre-se</a>
      </p>
    </div>
  </div>
  <aside class="hidden flex-1 items-center justify-center bg-muted p-8 lg:flex"></aside>
</div>
